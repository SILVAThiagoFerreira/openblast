name: Deploy Report Sismografia to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'Ferramentas/REPORT SISMOGRAFIA/pages/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site root
        run: |
          mkdir -p _site
          cp -r "Ferramentas/REPORT SISMOGRAFIA/pages/." _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
